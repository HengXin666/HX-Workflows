defaults:
  api_id_secret: TG_API_ID
  api_hash_secret: TG_API_HASH
  accounts_secret: TG_SESSION_STRINGS
  proxy_secret: TG_PROXY
  forward:
    enabled: true
    mode: notify
    when:
    - failure
    - matched
    bot_token_secret: TG_FORWARD_BOT_TOKEN
    chat_id_secret: TG_FORWARD_CHAT_ID
    include:
      contains:
      - 签到成功|积分
      regex: []
    exclude:
      contains:
      - 广告
      regex: []
    max_messages: 5
jobs:
- id: daily-sign
  node_id: task
  enabled: true
  peer: '@example_bot'
  accounts_secret: TG_SESSION_STRINGS
  actions:
  - type: open
    node_id: open-a
    peer: '@example_bot'
    regex: false
  - type: send
    node_id: send-a
    text: 签到
  - type: parse
    node_id: parse-a
    pattern: 签到成功|积分
    regex: true
    save_as: last_parse
    extract: messages
    after_send: true
    wait_seconds: 3.0
  - type: forward
    node_id: forward-a
    to_peer: me
    source: last_parse
  collect:
    last_messages: 5
  forward:
    enabled: true
    mode: user_forward
    to_peer: me
    when:
    - matched
    - failure
    include:
      contains:
      - 签到成功|积分
      regex: []
    exclude:
      contains: []
      regex: []
