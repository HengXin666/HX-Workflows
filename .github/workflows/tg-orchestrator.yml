name: TG Orchestrator

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: "run-all"
        type: choice
        options:
          - list
          - due
          - run-due
          - run-all
          - run
      task_id:
        description: "任务 ID，仅 mode=run 时使用"
        required: false
        default: "tg-example"
        type: string
  schedule:
    # GitHub Actions 的 cron 使用 UTC。
    # 北京时间 UTC+8 的 00:15 = UTC 前一天 16:15。
    # 这里固定为每 24 小时运行一次。
    - cron: "15 16 * * *"

permissions:
  contents: read

concurrency:
  group: tg-orchestrator
  cancel-in-progress: false

jobs:
  tg:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: tg

    env:
      TZ: Asia/Shanghai
      TG_API_ID: ${{ secrets.TG_API_ID }}
      TG_API_HASH: ${{ secrets.TG_API_HASH }}
      TG_SESSION_STRINGS: ${{ secrets.TG_SESSION_STRINGS }}
      TG_PROXY: ${{ secrets.TG_PROXY }}
      TG_FORWARD_BOT_TOKEN: ${{ secrets.TG_FORWARD_BOT_TOKEN }}
      TG_FORWARD_CHAT_ID: ${{ secrets.TG_FORWARD_CHAT_ID }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TO: ${{ secrets.SMTP_TO }}
      SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
      SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version-file: tg/.python-version

      - name: 安装依赖
        run: |
          uv sync
          cd ../emall
          uv sync

      - name: 查看任务列表
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'list' }}
        run: uv run python runner.py list

      - name: 查看当前到期任务
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'due' }}
        run: uv run python runner.py due

      - name: 手动运行当前到期任务
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'run-due' }}
        run: uv run python runner.py run-due

      - name: 定时运行所有已启用任务
        if: ${{ github.event_name == 'schedule' }}
        run: uv run python runner.py run-all

      - name: 手动运行所有已启用任务
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'run-all' }}
        run: uv run python runner.py run-all

      - name: 运行指定任务
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'run' }}
        run: uv run python runner.py run "${{ inputs.task_id }}"
